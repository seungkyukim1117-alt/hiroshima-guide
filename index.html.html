<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🗾 히로시마 여행 가이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --surface3: #2a2a38;
    --border: #2e2e3e;
    --accent: #ff6b35;
    --accent2: #ffd23f;
    --accent3: #06d6a0;
    --text: #f0f0f5;
    --text2: #a0a0b8;
    --text3: #606078;
    --red: #ff4757;
    --blue: #4a9eff;
    --purple: #9b59b6;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 16px 16px 0;
    border-bottom: 1px solid rgba(255,107,53,0.2);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .header-title {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(90deg, #ff6b35, #ffd23f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    flex: 1;
  }

  .count-badge {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 10px;
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 10px 42px 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
  }

  .search-input::placeholder { color: var(--text3); }

  .search-clear {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text3);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    display: none;
  }

  /* Filter Tabs */
  .filter-section {
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .filter-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 700;
  }

  .filter-btn:active { transform: scale(0.95); }

  /* Sort & View */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }

  .sort-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 5px 8px;
    cursor: pointer;
    outline: none;
  }

  .area-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 5px 8px;
    cursor: pointer;
    outline: none;
    flex: 1;
  }

  .view-btns {
    display: flex;
    gap: 4px;
  }

  .view-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text3);
    font-size: 14px;
    padding: 4px 7px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .view-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* List View */
  .list-container {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 80px;
  }

  .place-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.1s, box-shadow 0.1s;
    cursor: pointer;
  }

  .place-card:active { transform: scale(0.98); }

  .card-main {
    padding: 12px 14px;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }

  .cat-icon {
    font-size: 24px;
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    background: var(--surface2);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-info {
    flex: 1;
    min-width: 0;
  }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.3;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 6px;
  }

  .badge-cat {
    background: rgba(255,107,53,0.15);
    color: var(--accent);
    border: 1px solid rgba(255,107,53,0.3);
  }

  .badge-area {
    background: rgba(74,158,255,0.15);
    color: var(--blue);
    border: 1px solid rgba(74,158,255,0.3);
  }

  .badge-chain {
    background: rgba(160,160,184,0.1);
    color: var(--text3);
    border: 1px solid var(--border);
    font-size: 10px;
  }

  .rating-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }

  .stars {
    color: var(--accent2);
    font-size: 13px;
  }

  .rating-num {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent2);
  }

  .review-count {
    font-size: 11px;
    color: var(--text3);
  }

  .card-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .tag {
    font-size: 11px;
    color: var(--text3);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .card-quick {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .quick-info {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text2);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 6px;
  }

  .card-actions {
    display: flex;
    border-top: 1px solid var(--border);
  }

  .action-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    padding: 10px 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .action-btn:not(:last-child) {
    border-right: 1px solid var(--border);
  }

  .action-btn:active { background: var(--surface2); }
  .action-btn.map-btn { color: var(--accent3); }
  .action-btn.save-btn { color: var(--accent2); }
  .action-btn.saved { color: var(--accent2); }

  /* Expanded Card */
  .card-expanded {
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    background: var(--surface2);
    display: none;
  }

  .card-expanded.open { display: block; }

  .exp-section {
    margin-bottom: 12px;
  }

  .exp-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .exp-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  .exp-highlight {
    background: rgba(255,107,53,0.1);
    border-left: 3px solid var(--accent);
    padding: 8px 10px;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .exp-warn {
    background: rgba(255,71,87,0.1);
    border-left: 3px solid var(--red);
    padding: 8px 10px;
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: #ff9fa8;
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .exp-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .exp-chip {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 8px;
  }

  .exp-chip-label {
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 2px;
  }

  .exp-chip-value {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
  }

  /* Compact view */
  .compact-view .card-desc,
  .compact-view .card-tags,
  .compact-view .card-quick {
    display: none;
  }

  .compact-view .card-main {
    padding: 9px 12px;
  }

  .compact-view .card-header {
    margin-bottom: 0;
    align-items: center;
  }

  .compact-view .cat-icon {
    width: 32px;
    height: 32px;
    font-size: 18px;
    border-radius: 7px;
  }

  /* Saved screen */
  #saved-screen {
    display: none;
    padding: 10px 12px;
    padding-bottom: 80px;
    flex-direction: column;
    gap: 8px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .empty-state p {
    font-size: 14px;
    line-height: 1.6;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 6px 0;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    padding: 6px 4px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color 0.15s;
  }

  .nav-btn .nav-icon { font-size: 20px; }
  .nav-btn.active { color: var(--accent); }

  /* Result count */
  .result-info {
    padding: 6px 16px;
    font-size: 12px;
    color: var(--text3);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .result-info span { color: var(--accent); font-weight: 700; }

  /* Scroll to top */
  .scroll-top {
    position: fixed;
    bottom: 80px;
    right: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 16px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(255,107,53,0.4);
    z-index: 99;
  }

  .scroll-top.visible { display: flex; }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .place-card {
    animation: fadeIn 0.2s ease;
  }

  /* Review Quote */
  .review-quote {
    font-style: italic;
    color: var(--text2);
    font-size: 12px;
    line-height: 1.6;
    padding: 6px 0;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  .review-quote::before { content: '"'; color: var(--accent); font-size: 16px; }
  .review-quote::after { content: '"'; color: var(--accent); font-size: 16px; }

  /* Info chips row */
  .info-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }

  .info-chip {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text2);
  }

  .info-chip.green { background: rgba(6,214,160,0.1); border-color: rgba(6,214,160,0.3); color: var(--accent3); }
  .info-chip.red { background: rgba(255,71,87,0.1); border-color: rgba(255,71,87,0.3); color: var(--red); }
  .info-chip.yellow { background: rgba(255,210,63,0.1); border-color: rgba(255,210,63,0.3); color: var(--accent2); }
  .info-chip.blue { background: rgba(74,158,255,0.1); border-color: rgba(74,158,255,0.3); color: var(--blue); }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f5fa;
      --surface: #ffffff;
      --surface2: #f0f0f8;
      --surface3: #e8e8f0;
      --border: #dcdcec;
      --text: #1a1a2e;
      --text2: #4a4a6a;
      --text3: #9090b0;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">🗾 히로시마 여행 가이드</div>
    <div class="count-badge" id="total-count">131</div>
  </div>
  <div class="search-wrap">
    <input type="search" class="search-input" id="searchInput" placeholder="🔍 가게명, 메뉴, 특징 검색..." autocomplete="off">
    <button class="search-clear" id="searchClear">✕</button>
  </div>
</div>

<div class="filter-section">
  <div class="filter-row" id="catFilters">
    <button class="filter-btn active" data-cat="전체">전체 131</button>
    <button class="filter-btn" data-cat="관광지">🏛️ 관광지</button>
    <button class="filter-btn" data-cat="식당">🍽️ 식당</button>
    <button class="filter-btn" data-cat="카페">☕ 카페</button>
    <button class="filter-btn" data-cat="쇼핑">🛍️ 쇼핑</button>
    <button class="filter-btn" data-cat="바/술집">🍺 바/술집</button>
    <button class="filter-btn" data-cat="엔터테인먼트">🎮 엔터</button>
    <button class="filter-btn" data-cat="교통">🚉 교통</button>
  </div>
</div>

<div class="toolbar">
  <select class="area-select" id="areaFilter">
    <option value="전체">📍 전체 구역</option>
    <option value="평화공원">평화공원</option>
    <option value="미야지마">미야지마</option>
    <option value="히로시마역">히로시마역</option>
    <option value="가미야초">가미야초</option>
    <option value="혼도리">혼도리</option>
    <option value="혼도리/파르코">혼도리/파르코</option>
    <option value="후쿠로마치">후쿠로마치</option>
    <option value="긴자가이">긴자가이</option>
    <option value="나가레카와">나가레카와</option>
    <option value="오오테마치">오오테마치</option>
    <option value="신텐치">신텐치</option>
    <option value="나카마치">나카마치</option>
    <option value="다테마치">다테마치</option>
  </select>
  <select class="sort-select" id="sortSelect">
    <option value="default">순서</option>
    <option value="rating">⭐ 평점순</option>
    <option value="reviews">💬 리뷰순</option>
    <option value="name">가나다순</option>
  </select>
  <div class="view-btns">
    <button class="view-btn active" id="viewList" title="카드뷰">☰</button>
    <button class="view-btn" id="viewCompact" title="컴팩트">▤</button>
  </div>
</div>

<div class="result-info" id="resultInfo"><span id="resultCount">131</span>개 장소</div>

<div id="main-screen">
  <div class="list-container" id="listContainer"></div>
</div>

<div id="saved-screen">
  <div class="empty-state" id="savedEmpty">
    <div class="icon">⭐</div>
    <p>저장한 장소가 없어요.<br>카드의 ⭐ 버튼으로 저장하세요!</p>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="navAll" onclick="showScreen('all')">
    <span class="nav-icon">🗺️</span>전체목록
  </button>
  <button class="nav-btn" id="navSaved" onclick="showScreen('saved')">
    <span class="nav-icon">⭐</span>저장됨
  </button>
  <button class="nav-btn" onclick="copyChecklist()">
    <span class="nav-icon">📋</span>체크리스트
  </button>
</div>

function getFiltered() {
  let data = [...RAW_DATA];
  
  if (currentCat !== "전체") {
    data = data.filter(d => d["카테고리"] === currentCat);
  }
  
  if (currentArea !== "전체") {
    data = data.filter(d => d["구역"].includes(currentArea));
  }
  
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    data = data.filter(d =>
      d["가게명"].toLowerCase().includes(q) ||
      d["설명/특징"].toLowerCase().includes(q) ||
      d["대표 메뉴"].toLowerCase().includes(q) ||
      d["추천 메뉴"].toLowerCase().includes(q) ||
      d["세부 카테고리"].toLowerCase().includes(q) ||
      d["구역"].toLowerCase().includes(q) ||
      d["대표 리뷰"].toLowerCase().includes(q) ||
      d["기타 정보(팁 등)"].toLowerCase().includes(q)
    );
  }
  
  if (currentSort === "rating") {
    data.sort((a, b) => parseFloat(b["평점"]) - parseFloat(a["평점"]));
  } else if (currentSort === "reviews") {
    data.sort((a, b) => parseInt(b["리뷰"].replace(/,/g, "")) - parseInt(a["리뷰"].replace(/,/g, "")));
  } else if (currentSort === "name") {
    data.sort((a, b) => a["가게명"].localeCompare(b["가게명"]));
  }
  
  return data;
}

function renderStars(rating) {
  const r = parseFloat(rating);
  if (isNaN(r)) return "";
  const full = Math.floor(r);
  const half = r - full >= 0.3;
  let s = "★".repeat(full);
  if (half) s += "⭐".repeat(1); 
  return s;
}

function formatReviews(n) {
  const num = parseInt(n.replace(/,/g, ""));
  if (isNaN(num)) return "";
  if (num >= 10000) return (num/10000).toFixed(1) + "만";
  if (num >= 1000) return (num/1000).toFixed(1) + "천";
  return num.toString();
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

  const taxfree = d["면세"];
  const url = d["google_maps_url"];
  const isChain = d["체인점"] === "O";
  const isSaved = savedPlaces.has(name);
  const isExpanded = expandedCards.has(name);
  
  const emoji = CAT_EMOJI[cat] || "📍";
  const ratingNum = parseFloat(rating);
  const ratingColor = ratingNum >= 4.5 ? "#06d6a0" : ratingNum >= 4.0 ? "#ffd23f" : "#a0a0b8";
  
  // Build chips for expanded
  const chips = [];
  if (price && price !== "-") chips.push(`<span class="info-chip yellow">💴 ${escapeHtml(price)}</span>`);
  if (hours && hours !== "-") chips.push(`<span class="info-chip blue">🕐 ${escapeHtml(hours)}</span>`);
  if (days && days !== "-") chips.push(`<span class="info-chip">📅 ${escapeHtml(days)}</span>`);
  if (card && card !== "-") chips.push(`<span class="info-chip green">💳 ${escapeHtml(card.length > 30 ? card.substring(0,30)+"..." : card)}</span>`);
  if (taxfree && taxfree !== "해당없음 (무료 입장)" && taxfree !== "해당없음" && taxfree !== "-") chips.push(`<span class="info-chip blue">🛃 ${escapeHtml(taxfree)}</span>`);
  if (reservation && reservation !== "-") chips.push(`<span class="info-chip">📞 ${escapeHtml(reservation)}</span>`);
  if (langMenu && langMenu !== "-" && langMenu !== "해당없음") chips.push(`<span class="info-chip green">🌐 ${escapeHtml(langMenu)}</span>`);

  return `<div class="place-card" id="card-${idx}">
  <div class="card-main" onclick="toggleCard('${name.replace(/'/g,"\\'")}',${idx})">
    <div class="card-header">
      <div class="cat-icon">${emoji}</div>
      <div class="card-info">
        <div class="card-name">${name}${isChain ? ' <span style="font-size:10px;color:var(--text3)">[체인]</span>' : ""}</div>
        <div class="card-meta">
          <span class="badge badge-cat">${subcat}</span>
          <span class="badge badge-area">📍${area}</span>
        </div>
        ${!isNaN(ratingNum) ? `<div class="rating-wrap">
          <span style="color:${ratingColor};font-size:13px">★</span>
          <span class="rating-num" style="color:${ratingColor}">${rating}</span>
          <span class="review-count">(${formatReviews(reviews)}개 리뷰)</span>
        </div>` : ""}
      </div>
    </div>
    ${desc ? `<div class="card-desc">${desc}</div>` : ""}
    ${(mainMenu && mainMenu !== "-") ? `<div class="card-quick">
      <span class="quick-info">🍴 ${escapeHtml(mainMenu.length>40?mainMenu.substring(0,40)+"...":mainMenu)}</span>
      ${(price && price !== "-") ? `<span class="quick-info">💴 ${escapeHtml(price)}</span>` : ""}
    </div>` : ""}
  </div>
  <div class="card-expanded${isExpanded ? " open" : ""}" id="exp-${idx}">
    ${warn && warn !== "-" && warn.length > 3 ? `<div class="exp-warn">⚠️ ${escapeHtml(warn)}</div>` : ""}
    ${tip && tip !== "-" && tip.length > 3 ? `<div class="exp-highlight">💡 ${escapeHtml(tip)}</div>` : ""}
    ${chips.length ? `<div class="info-chips">${chips.join("")}</div>` : ""}
    ${(recMenu && recMenu !== "-") ? `<div class="exp-section"><div class="exp-label">추천 메뉴</div><div class="exp-value">🍽️ ${escapeHtml(recMenu)}</div></div>` : ""}
    ${review && review.length > 5 ? `<div class="review-quote">${escapeHtml(review.length>120?review.substring(0,120)+"...":review)}</div>` : ""}
  </div>
  <div class="card-actions">
    ${url ? `<button class="action-btn map-btn" onclick="openMap('${url.replace(/'/g,"\\'")}')" >🗺️ 지도열기</button>` : ""}
    <button class="action-btn save-btn${isSaved?" saved":""}" id="save-${idx}" onclick="toggleSave('${name.replace(/'/g,"\\'")}',${idx})">
      ${isSaved ? "⭐ 저장됨" : "☆ 저장"}
    </button>
    <button class="action-btn" onclick="sharePlace('${name.replace(/'/g,"\\'")}',${idx})">↗️ 공유</button>
  </div>
</div>`;
}

function toggleCard(name, idx) {
  const expEl = document.getElementById(`exp-${idx}`);
  if (expandedCards.has(name)) {
    expandedCards.delete(name);
    expEl.classList.remove("open");
  } else {
    expandedCards.add(name);
    expEl.classList.add("open");
  }
}

function openMap(url) {
  window.open(url, "_blank");
}

function toggleSave(name, idx) {
  if (savedPlaces.has(name)) {
    savedPlaces.delete(name);
  } else {
    savedPlaces.add(name);
  }
  saveSaved();
  const btn = document.getElementById(`save-${idx}`);
  if (btn) {
    const isSaved = savedPlaces.has(name);
    btn.textContent = isSaved ? "⭐ 저장됨" : "☆ 저장";
    btn.className = `action-btn save-btn${isSaved ? " saved" : ""}`;
  }
  // Update saved screen if visible
  if (document.getElementById("saved-screen").style.display === "flex") {
    renderSaved();
  }
}

function sharePlace(name, idx) {
  const d = RAW_DATA.find(r => r["가게명"] === name);
  if (!d) return;
  const text = `${d["가게명"]}\n📍 ${d["구역"]} | ${d["세부 카테고리"]}\n⭐ ${d["평점"]} | 💴 ${d["1인 소비 가격대"]}\n🕐 ${d["영업시간"]}\n${d["google_maps_url"]}`;
  if (navigator.share) {
    navigator.share({ text }).catch(() => copyText(text));
  } else {
    copyText(text);
    alert("클립보드에 복사되었습니다!");
  }
}

function copyText(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
}

function render() {
  const data = getFiltered();
  document.getElementById("resultCount").textContent = data.length;
  document.getElementById("total-count").textContent = data.length;
  
  const container = document.getElementById("listContainer");
  container.innerHTML = data.map((d, i) => makeCard(d, i)).join("");
  
  if (isCompact) {
    container.classList.add("compact-view");
  } else {
    container.classList.remove("compact-view");
  }
}

function renderSaved() {
  const savedScreen = document.getElementById("saved-screen");
  savedScreen.innerHTML = "";
  
  const savedData = RAW_DATA.filter(d => savedPlaces.has(d["가게명"]));
  
  if (savedData.length === 0) {
    savedScreen.innerHTML = `<div class="empty-state"><div class="icon">⭐</div><p>저장한 장소가 없어요.<br>카드의 ☆ 버튼으로 저장하세요!</p></div>`;
    return;
  }
  
  const container = document.createElement("div");
  container.className = "list-container";
  container.style.padding = "10px 12px";
  container.innerHTML = savedData.map((d, i) => makeCard(d, 9000+i)).join("");
  savedScreen.appendChild(container);
}

function showScreen(screen) {
  const mainScreen = document.getElementById("main-screen");
  const savedScreen = document.getElementById("saved-screen");
  const navAll = document.getElementById("navAll");
  const navSaved = document.getElementById("navSaved");
  
  if (screen === "all") {
    mainScreen.style.display = "block";
    savedScreen.style.display = "none";
    navAll.classList.add("active");
    navSaved.classList.remove("active");
  } else {
    mainScreen.style.display = "none";
    savedScreen.style.display = "flex";
    savedScreen.style.flexDirection = "column";
    navAll.classList.remove("active");
    navSaved.classList.add("active");
    renderSaved();
  }
}

function copyChecklist() {
  const savedData = RAW_DATA.filter(d => savedPlaces.has(d["가게명"]));
  if (savedData.length === 0) {
    alert("저장된 장소가 없어요! 먼저 장소를 저장해주세요.");
    return;
  }
  
  let text = "🗾 히로시마 여행 체크리스트\n";
  text += "=".repeat(30) + "\n\n";
  
  const byArea = {};
  savedData.forEach(d => {
    const area = d["구역"] || "기타";
    if (!byArea[area]) byArea[area] = [];
    byArea[area].push(d);
  });
  
  for (const area of Object.keys(byArea)) {
    text += `📍 [${area}]\n`;
    byArea[area].forEach(d => {
      text += `  ☐ ${d["가게명"]}`;
      if (d["영업시간"] && d["영업시간"] !== "-") text += ` (${d["영업시간"]})`;
      text += "\n";
      if (d["추천 메뉴"] && d["추천 메뉴"] !== "-") text += `     🍽️ ${d["추천 메뉴"]}\n`;
    });
    text += "\n";
  }
  
  copyText(text);
  alert(`✅ 체크리스트가 복사되었어요!\n(${savedData.length}개 장소)`);
}

// Search
document.getElementById("searchInput").addEventListener("input", function() {
  currentSearch = this.value.trim();
  document.getElementById("searchClear").style.display = currentSearch ? "block" : "none";
  render();
});

document.getElementById("searchClear").addEventListener("click", function() {
  document.getElementById("searchInput").value = "";
  currentSearch = "";
  this.style.display = "none";
  render();
});

// Category filter
document.querySelectorAll("[data-cat]").forEach(btn => {
  btn.addEventListener("click", function() {
    document.querySelectorAll("[data-cat]").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    currentCat = this.dataset.cat;
    render();
  });
});

// Area filter
document.getElementById("areaFilter").addEventListener("change", function() {
  currentArea = this.value;
  render();
});

// Sort
document.getElementById("sortSelect").addEventListener("change", function() {
  currentSort = this.value;
  render();
});

// View toggle
document.getElementById("viewList").addEventListener("click", function() {
  isCompact = false;
  this.classList.add("active");
  document.getElementById("viewCompact").classList.remove("active");
  render();
});

document.getElementById("viewCompact").addEventListener("click", function() {
  isCompact = true;
  this.classList.add("active");
  document.getElementById("viewList").classList.remove("active");
  render();
});

// Scroll to top
window.addEventListener("scroll", function() {
  const btn = document.getElementById("scrollTop");
  if (window.scrollY > 400) {
    btn.classList.add("visible");
  } else {
    btn.classList.remove("visible");
  }
});

// Update category filter counts
function updateFilterCounts() {
  document.querySelectorAll("[data-cat]").forEach(btn => {
    const cat = btn.dataset.cat;
    if (cat === "전체") {
      btn.textContent = "전체 " + RAW_DATA.length;
    } else {
      const count = RAW_DATA.filter(d => d["카테고리"] === cat).length;
      const emoji = CAT_EMOJI[cat] || "";
      const label = cat === "엔터테인먼트" ? "엔터" : cat;
      btn.textContent = `${emoji} ${label} ${count}`;
    }
  });
}

// Init
updateFilterCounts();
render();
</script>
</body>
</html>
